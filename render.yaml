services:
  - type: web
    name: ajax-api
    runtime: python
    repo: https://github.com/JamesRendon01/AJAX.git  # CAMBIA esto por tu URL de GitHub
    branch: main
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && bash start.sh
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ajax-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CLOUDINARY_CLOUD_NAME
        value: dmjjy7xjm
      - key: RESEND_FROM
        value: onboarding@resend.dev
      - key: FRONTEND_URL
        value: https://ajax-liart.vercel.app
      - key: RESET_TOKEN_EXPIRE_HOURS
        value: "1"
      - key: STORAGE_BUCKET
        value: ajax-uploads

      # ═══════════════════════════════════════════════════════════════
      # VARIABLES SENSIBLES - Configurar en Render Dashboard
      # ═══════════════════════════════════════════════════════════════
      # Estas variables NO deben estar en el repositorio.
      # Configúralas manualmente en:
      #   Render Dashboard > ajax-api > Environment > Environment Variables
      #
      #   CLOUDINARY_API_KEY     →  Tu API Key de Cloudinary
      #   CLOUDINARY_API_SECRET  →  Tu API Secret de Cloudinary
      #   RESEND_API_KEY         →  Tu API Key de Resend
      # ═══════════════════════════════════════════════════════════════

databases:
  - name: ajax-db
    databaseName: ajax
    plan: free
    region: oregon
